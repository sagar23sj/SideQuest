<style>

        }

            to { transform: translateY(0); }
        }
        .backdrop-enter {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Hide scrollbar for horizontal scrolling but keep functionality */

<script>
        // Simple interactive script to simulate closing the sheet
        document.getElementById('backdrop').addEventListener('click', () => {
            const sheet = document.querySelector('.bottom-sheet-enter');
            const backdrop = document.getElementById('backdrop');
            
            sheet.style.animation = 'slideUp 0.3s cubic-bezier(0.2, 0, 0, 1) reverse forwards';
            backdrop.style.animation = 'fadeIn 0.2s ease-out reverse forwards';
            
            setTimeout(() => {
                // In a real app, this would route back or close the modal
                console.log('Sheet closed');
            }, 300);
        });
