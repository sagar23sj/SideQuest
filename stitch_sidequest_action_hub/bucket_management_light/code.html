<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SideQuest - Manage Buckets</title>
<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Outfit:wght@500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#8ef4e9",
                    "on-tertiary-fixed": "#00201d",
                    "error": "#ba1a1a",
                    "primary-fixed-dim": "#ffb59e",
                    "on-secondary-container": "#533487",
                    "primary-container": "#ff8a65",
                    "inverse-primary": "#ffb59e",
                    "on-tertiary-fixed-variant": "#00504a",
                    "on-tertiary-container": "#004842",
                    "secondary-container": "#c5a3ff",
                    "tertiary-container": "#53bbb1",
                    "on-surface": "#001f2a",
                    "on-secondary": "#ffffff",
                    "on-error": "#ffffff",
                    "inverse-surface": "#163440",
                    "primary-fixed": "#ffdbd0",
                    "surface-bright": "#f4faff",
                    "error-container": "#ffdad6",
                    "on-error-container": "#93000a",
                    "tertiary": "#006a63",
                    "secondary-fixed-dim": "#d4bbff",
                    "on-primary-fixed": "#3a0b00",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#e6f6ff",
                    "surface-container": "#d9f2ff",
                    "secondary-fixed": "#ebdcff",
                    "surface-dim": "#c0dfee",
                    "outline": "#89726b",
                    "on-secondary-fixed": "#270058",
                    "outline-variant": "#ddc0b8",
                    "inverse-on-surface": "#e0f4ff",
                    "surface": "#f4faff",
                    "surface-container-high": "#ceedfd",
                    "on-surface-variant": "#56423c",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#752305",
                    "tertiary-fixed-dim": "#71d7cd",
                    "secondary": "#6d4ea2",
                    "surface-variant": "#c9e7f7",
                    "on-secondary-fixed-variant": "#543589",
                    "surface-container-highest": "#c9e7f7",
                    "background": "#f4faff",
                    "on-primary-fixed-variant": "#7f2a0d",
                    "on-background": "#001f2a",
                    "surface-tint": "#9f4122",
                    "primary": "#9f4122",
                    "on-tertiary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "24px",
                    "sm": "8px",
                    "margin-tablet": "32px",
                    "margin-mobile": "20px",
                    "xs": "4px",
                    "xl": "32px",
                    "base": "4px",
                    "md": "16px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "headline-lg": ["Outfit"],
                    "display-lg": ["Outfit"],
                    "label-sm": ["Inter"],
                    "headline-lg-mobile": ["Outfit"],
                    "body-lg": ["Inter"],
                    "label-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "title-lg": ["Outfit"]
            },
            "fontSize": {
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                    "display-lg": ["57px", {"lineHeight": "64px", "letterSpacing": "-0.25px", "fontWeight": "700"}],
                    "label-sm": ["11px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0.5px", "fontWeight": "400"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "500"}],
                    "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.25px", "fontWeight": "400"}],
                    "title-lg": ["22px", {"lineHeight": "28px", "fontWeight": "500"}]
            }
          }
        }
      }
    </script>
<style>
        /* Smooth, bouncy interactions */
        .spring-bounce {
            transition-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* Subtle inner stroke for expressive cards */
        .inner-stroke {
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.3);
        }
        
        /* Ambient shadow for elevated elements */
        .ambient-shadow-primary {
            box-shadow: 0 8px 24px -4px rgba(255, 138, 101, 0.25);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-lg text-body-lg min-h-screen relative pb-32">
<!-- JSON Global Brand Nav (Strict Implementation) -->
<header class="bg-background dark:bg-background w-full top-0 sticky z-40">
<div class="flex justify-between items-center px-margin-mobile py-sm w-full text-primary dark:text-primary-fixed-dim">
<div class="flex items-center gap-sm active:scale-95 transition-transform duration-200 ease-out hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors rounded-full p-xs cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">rocket_launch</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold tracking-tight">SideQuest</h1>
<div class="flex items-center gap-sm active:scale-95 transition-transform duration-200 ease-out hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors rounded-full p-xs cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">settings</span>
</div>
</div>
</header>
<!-- Screen Context Header (Satisfying Prompt Intent) -->
<div class="px-margin-mobile py-md flex items-center gap-sm mt-sm">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface hover:bg-surface-variant active:scale-90 spring-bounce transition-all">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface ml-xs">My Buckets</h2>
</div>
<!-- Main Content Canvas -->
<main class="px-margin-mobile mt-sm flex flex-col gap-md">
<!-- List of Buckets -->
<div class="flex flex-col gap-sm" role="list">
<!-- Bucket 1: Travel (Violet -> Secondary) -->
<div class="group flex items-center gap-md p-md bg-secondary-container text-on-secondary-container rounded-lg inner-shadow-sm active:scale-[0.98] transition-transform duration-200 ease-out cursor-grab shadow-sm inner-stroke relative overflow-hidden" role="listitem">
<div class="absolute inset-0 bg-gradient-to-br from-white/20 to-transparent pointer-events-none rounded-lg"></div>
<!-- Drag Handle -->
<button aria-label="Reorder Travel bucket" class="text-on-secondary-container/50 hover:text-on-secondary-container touch-none shrink-0">
<span class="material-symbols-outlined">drag_indicator</span>
</button>
<!-- Icon & Content -->
<div class="w-12 h-12 rounded-full bg-secondary text-on-secondary flex items-center justify-center shrink-0 shadow-inner">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">flight_takeoff</span>
</div>
<div class="flex-1 min-w-0 flex flex-col justify-center">
<h3 class="font-title-lg text-title-lg truncate">Travel</h3>
<p class="font-label-sm text-label-sm opacity-80 mt-xs">5 items</p>
</div>
<!-- More Menu -->
<button aria-label="More options for Travel bucket" class="w-10 h-10 flex items-center justify-center rounded-full text-on-secondary-container hover:bg-secondary/10 active:bg-secondary/20 transition-colors shrink-0">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<!-- Bucket 2: Home (Amber -> Tertiary used for distinct vibrancy in palette) -->
<div class="group flex items-center gap-md p-md bg-tertiary-container text-on-tertiary-container rounded-lg inner-shadow-sm active:scale-[0.98] transition-transform duration-200 ease-out cursor-grab shadow-sm inner-stroke relative overflow-hidden" role="listitem">
<div class="absolute inset-0 bg-gradient-to-br from-white/20 to-transparent pointer-events-none rounded-lg"></div>
<!-- Drag Handle -->
<button aria-label="Reorder Home bucket" class="text-on-tertiary-container/50 hover:text-on-tertiary-container touch-none shrink-0">
<span class="material-symbols-outlined">drag_indicator</span>
</button>
<!-- Icon & Content -->
<div class="w-12 h-12 rounded-full bg-tertiary text-on-tertiary flex items-center justify-center shrink-0 shadow-inner">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
</div>
<div class="flex-1 min-w-0 flex flex-col justify-center">
<h3 class="font-title-lg text-title-lg truncate">Home</h3>
<p class="font-label-sm text-label-sm opacity-80 mt-xs">12 items</p>
</div>
<!-- More Menu -->
<button aria-label="More options for Home bucket" class="w-10 h-10 flex items-center justify-center rounded-full text-on-tertiary-container hover:bg-tertiary/10 active:bg-tertiary/20 transition-colors shrink-0">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<!-- Bucket 3: Shopping (Coral -> Primary) -->
<div class="group flex items-center gap-md p-md bg-primary-container text-on-primary-container rounded-lg inner-shadow-sm active:scale-[0.98] transition-transform duration-200 ease-out cursor-grab shadow-sm inner-stroke relative overflow-hidden ring-2 ring-primary/20" role="listitem">
<div class="absolute inset-0 bg-gradient-to-br from-white/30 to-transparent pointer-events-none rounded-lg"></div>
<!-- Drag Handle -->
<button aria-label="Reorder Shopping bucket" class="text-on-primary-container/50 hover:text-on-primary-container touch-none shrink-0">
<span class="material-symbols-outlined">drag_indicator</span>
</button>
<!-- Icon & Content -->
<div class="w-12 h-12 rounded-full bg-primary text-on-primary flex items-center justify-center shrink-0 shadow-inner">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_bag</span>
</div>
<div class="flex-1 min-w-0 flex flex-col justify-center">
<div class="flex items-center gap-sm">
<h3 class="font-title-lg text-title-lg truncate">Shopping</h3>
</div>
<div class="flex items-center gap-sm mt-xs flex-wrap">
<p class="font-label-sm text-label-sm opacity-80 shrink-0">8 items</p>
<!-- Shopping Features Enabled Chip -->
<span class="inline-flex items-center gap-xs bg-surface/60 text-on-surface px-sm py-[2px] rounded-full font-label-sm text-label-sm border border-primary/10">
<span class="material-symbols-outlined text-[12px]">verified</span>
                            Shopping features enabled
                        </span>
</div>
</div>
<!-- More Menu -->
<button aria-label="More options for Shopping bucket" class="w-10 h-10 flex items-center justify-center rounded-full text-on-primary-container hover:bg-primary/10 active:bg-primary/20 transition-colors shrink-0">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</div>
</main>
<!-- Prominent Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full px-margin-mobile pb-margin-mobile pt-xl bg-gradient-to-t from-surface to-transparent pointer-events-none z-50">
<button class="w-full flex items-center justify-center gap-sm bg-primary text-on-primary font-label-lg text-label-lg py-lg rounded-full ambient-shadow-primary active:scale-[0.97] spring-bounce transition-all pointer-events-auto relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-r from-white/0 via-white/20 to-white/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 ease-in-out"></div>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add</span>
            New Bucket
        </button>
</div>
</body></html>
