<style>
        .custom-checkbox:checked {
            background-color: theme('colors.primary');
            border-color: theme('colors.primary');
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
        }
        
        .strike-through-animation {
            position: relative;
            display: inline-block;
        }
        
        .strike-through-animation::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 0;
            height: 2px;
            background-color: theme('colors.on-surface-variant');
            transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .is-checked .strike-through-animation::after {
            width: 100%;
        }

        .item-checked-bg {
            background-color: theme('colors.surface-container-lowest');
            opacity: 0.7;
            transition: all 0.3s ease;
        }

        .sparkle-effect {
            animation: pulse-glow 0.8s ease-out;
        }

        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(159, 65, 34, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(159, 65, 34, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(159, 65, 34, 0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen font-body-md md:font-body-lg flex flex-col items-center pb-24">
<!-- Top Navigation (Sub-page / Intent: Action Plan / Not top level so no bottom nav) -->
<header class="w-full max-w-3xl mx-auto h-20 flex items-center justify-between px-margin-mobile bg-surface sticky top-0 z-50">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-primary text-center flex-1">DIY Bookshelf</h1>
<button aria-label="Options" class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">more_vert</span>
</button>
</header>
<main class="w-full max-w-3xl mx-auto px-margin-mobile pt-sm flex-1 flex flex-col gap-lg">
<!-- Hero Preview -->
<div class="w-full aspect-video rounded-xl overflow-hidden relative shadow-sm group">
<div class="absolute inset-0 bg-cover bg-center" data-alt="A warm, brightly lit woodworking workshop. In the center, a partially assembled modern wooden bookshelf rests on a sturdy workbench. Tools like a measuring tape, pencil, and a small saw are neatly arranged nearby. The aesthetic is clean, expressive, and inviting, with a light-mode friendly color palette featuring natural wood tones, crisp whites, and subtle vibrant orange tool accents. The mood is creative and encouraging." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA8Ne98oC1U8Zept0PFYCQC-HKEdQbZ1KHKxDxJgrSVrR9Jc7O_v34z-QmYjkPg0xmhnY96nQJd8FfcYOI6bImdAN6VRNhuKZaOpm2B7Zcoc9I2zZ4nQ1gtL_SG3tUwQNAVLopaenjVhdxP8vpqAPA5o2HeO68Z6wDed7SRS8o8nFBKhPNyX_V_faOrIBSXSuLimVzmSyfR4Fc1V-SgSHTrIpR9ER7tvMad52_14LPvFAHzRumvK8o9-P_jWxmkXm0RlpVaXzzt8A')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-on-background/60 to-transparent"></div>
<div class="absolute bottom-4 left-4 right-4 flex items-end justify-between">
<div>
<span class="bg-tertiary-container text-on-tertiary-container font-label-sm text-label-sm px-3 py-1 rounded-full uppercase tracking-wider mb-2 inline-block">Woodworking</span>
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-white">Modern A-Frame Shelf</h2>
</div>
<button class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center hover:bg-white/30 transition-colors">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
</div>
<!-- Progress Overview -->
<div class="bg-surface-container rounded-[28px] p-lg border border-outline-variant/30 flex items-center justify-between shadow-sm">
<div>
<h3 class="font-title-lg text-title-lg text-on-surface mb-1">Action Plan</h3>
<p class="font-body-md text-body-md text-on-surface-variant">2 of 5 steps completed</p>
</div>
<div class="w-16 h-16 rounded-full bg-secondary-container flex items-center justify-center relative">
<svg class="w-16 h-16 transform -rotate-90" viewbox="0 0 36 36">
<path class="text-surface-variant stroke-current" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke-width="4"></path>
<path class="text-primary stroke-current transition-all duration-1000 ease-out" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke-dasharray="40, 100" stroke-linecap="round" stroke-width="4"></path>
</svg>
<span class="absolute font-label-lg text-label-lg text-on-secondary-container">40%</span>
</div>
</div>
<!-- Checklist -->
<div class="flex flex-col gap-sm" id="checklist-container">
<!-- Checked Item -->
<label class="item-checked-bg rounded-lg p-md flex items-center gap-md cursor-pointer border border-transparent transition-all hover:bg-surface-container-high group">
<input checked="" class="custom-checkbox w-6 h-6 rounded-md border-2 border-outline text-primary focus:ring-primary focus:ring-offset-surface bg-surface-container-lowest appearance-none transition-colors" type="checkbox"/>
<div class="flex-1 is-checked">
<p class="font-body-lg text-body-lg text-on-surface-variant strike-through-animation">Measure the living room corner</p>
</div>
</label>
<!-- Checked Item -->
<label class="item-checked-bg rounded-lg p-md flex items-center gap-md cursor-pointer border border-transparent transition-all hover:bg-surface-container-high group">
<input checked="" class="custom-checkbox w-6 h-6 rounded-md border-2 border-outline text-primary focus:ring-primary focus:ring-offset-surface bg-surface-container-lowest appearance-none transition-colors" type="checkbox"/>
<div class="flex-1 is-checked">
<p class="font-body-lg text-body-lg text-on-surface-variant strike-through-animation">Buy pine wood boards (1x8x8)</p>
</div>
</label>
<!-- Unchecked Item -->
<label class="bg-surface-container rounded-lg p-md flex items-center gap-md cursor-pointer border border-outline-variant/50 transition-all hover:bg-surface-container-high hover:shadow-sm group">
<input class="custom-checkbox w-6 h-6 rounded-md border-2 border-outline text-primary focus:ring-primary focus:ring-offset-surface bg-surface-container-lowest appearance-none transition-colors" type="checkbox"/>
<div class="flex-1">
<p class="font-body-lg text-body-lg text-on-surface">Cut boards to length (4 pieces at 36")</p>
</div>
</label>
<!-- Unchecked Item -->
<label class="bg-surface-container rounded-lg p-md flex items-center gap-md cursor-pointer border border-outline-variant/50 transition-all hover:bg-surface-container-high hover:shadow-sm group">
<input class="custom-checkbox w-6 h-6 rounded-md border-2 border-outline text-primary focus:ring-primary focus:ring-offset-surface bg-surface-container-lowest appearance-none transition-colors" type="checkbox"/>
<div class="flex-1">
<p class="font-body-lg text-body-lg text-on-surface">Sand all rough edges</p>
</div>
</label>
<!-- Unchecked Item -->
<label class="bg-surface-container rounded-lg p-md flex items-center gap-md cursor-pointer border border-outline-variant/50 transition-all hover:bg-surface-container-high hover:shadow-sm group">
<input class="custom-checkbox w-6 h-6 rounded-md border-2 border-outline text-primary focus:ring-primary focus:ring-offset-surface bg-surface-container-lowest appearance-none transition-colors" type="checkbox"/>
<div class="flex-1">
<p class="font-body-lg text-body-lg text-on-surface">Assemble using wood glue and screws</p>
</div>
</label>
<!-- Add Step Input -->
<div class="mt-sm bg-surface-container-low rounded-lg p-md flex items-center gap-md border border-dashed border-outline/50 focus-within:border-primary focus-within:bg-surface-container transition-all">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 0;">add</span>
<input class="flex-1 bg-transparent border-none p-0 focus:ring-0 font-body-lg text-body-lg text-on-surface placeholder-on-surface-variant/50" placeholder="Add a new step..." type="text"/>
</div>
</div>
</main>
<!-- Sticky Bottom CTA -->
<div class="fixed bottom-0 left-0 w-full bg-surface/80 backdrop-blur-md border-t border-surface-variant/50 p-margin-mobile z-50 flex justify-center">
<button class="w-full max-w-md bg-gradient-to-r from-primary to-surface-tint text-on-primary font-label-lg text-label-lg py-4 px-8 rounded-full shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-2 relative overflow-hidden" id="mark-complete-btn">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            Mark Quest Complete
            <div class="absolute inset-0 bg-white/20 transform -skew-x-12 -translate-x-full opacity-0 group-hover:animate-[shimmer_1.5s_infinite]"></div>
</button>
</div>
<script>
        // Simple interaction script to demonstrate checking items
        document.querySelectorAll('.custom-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                const label = this.closest('label');
                const textContainer = label.querySelector('div');
                
                if(this.checked) {
                    textContainer.classList.add('is-checked');
                    label.classList.remove('bg-surface-container', 'border-outline-variant/50', 'hover:shadow-sm');
                    label.classList.add('item-checked-bg');
                    label.classList.add('sparkle-effect');
                    setTimeout(() => label.classList.remove('sparkle-effect'), 800);
                } else {
                    textContainer.classList.remove('is-checked');
                    label.classList.add('bg-surface-container', 'border-outline-variant/50', 'hover:shadow-sm');
                    label.classList.remove('item-checked-bg');
                }
            });
        });

        // CTA button interaction
        document.getElementById('mark-complete-btn').addEventListener('click', function() {
            this.innerHTML = '<span class="material-symbols-outlined" style="font-variation-settings: \'FILL\' 1;">celebration</span> Quest Accomplished!';
            this.classList.replace('from-primary', 'from-tertiary-container');
            this.classList.replace('to-surface-tint', 'to-tertiary');
            this.classList.add('sparkle-effect');
            setTimeout(() => {
                this.innerHTML = '<span class="material-symbols-outlined" style="font-variation-settings: \'FILL\' 1;">check_circle</span> Mark Quest Complete';
                this.classList.replace('from-tertiary-container', 'from-primary');
                this.classList.replace('to-tertiary', 'to-surface-tint');
            }, 3000);
        });
    </script>
