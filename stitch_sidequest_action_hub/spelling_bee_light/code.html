<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<style>
        .clip-hexagon {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        /* Hide scrollbar for a cleaner look but keep functionality */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Spring animation for interactions */
        .spring-bounce:active {
            transform: scale(0.9);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body-lg min-h-screen flex flex-col overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-background dark:bg-background flat no shadows flex justify-between items-center px-margin-mobile py-sm z-40">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container-high transition-colors active:scale-95 duration-200 ease-out">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">rocket_launch</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary-fixed-dim tracking-tight">SideQuest</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container-high transition-colors active:scale-95 duration-200 ease-out">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">settings</span>
</button>
</header>
<!-- Main Game Canvas -->
<main class="flex-1 flex flex-col items-center pt-8 pb-[120px] px-margin-mobile relative">
<!-- Ambient decorative background element -->
<div class="absolute top-20 left-1/2 -translate-x-1/2 w-[300px] h-[300px] bg-tertiary-container/10 rounded-full blur-3xl -z-10"></div>
<!-- Current Word Display -->
<div class="h-16 flex items-center justify-center mb-10 w-full">
<span class="font-display-lg text-display-lg text-on-surface tracking-[0.2em] font-bold relative inline-block">
                P I C T O <span class="text-on-surface-variant opacity-30 animate-pulse">|</span>
</span>
</div>
<!-- Honeycomb Area -->
<div class="flex flex-col items-center justify-center mb-12 select-none relative z-10">
<!-- Row 1 -->
<div class="flex justify-center gap-2 mb-[-26px]">
<div class="w-[88px] h-[100px] bg-secondary-container text-on-secondary-container clip-hexagon flex items-center justify-center font-headline-lg text-headline-lg hover:bg-secondary hover:text-on-secondary transition-colors cursor-pointer shadow-sm active:scale-95 spring-bounce">
                    T
                </div>
<div class="w-[88px] h-[100px] bg-secondary-container text-on-secondary-container clip-hexagon flex items-center justify-center font-headline-lg text-headline-lg hover:bg-secondary hover:text-on-secondary transition-colors cursor-pointer shadow-sm active:scale-95 spring-bounce">
                    O
                </div>
</div>
<!-- Row 2 -->
<div class="flex justify-center gap-2 mb-[-26px]">
<div class="w-[88px] h-[100px] bg-secondary-container text-on-secondary-container clip-hexagon flex items-center justify-center font-headline-lg text-headline-lg hover:bg-secondary hover:text-on-secondary transition-colors cursor-pointer shadow-sm active:scale-95 spring-bounce">
                    S
                </div>
<!-- Center Letter -->
<div class="w-[88px] h-[100px] bg-primary text-on-primary clip-hexagon flex items-center justify-center font-display-lg text-[40px] font-bold cursor-pointer shadow-md active:scale-95 spring-bounce ring-4 ring-primary-container ring-opacity-50">
                    C
                </div>
<div class="w-[88px] h-[100px] bg-secondary-container text-on-secondary-container clip-hexagon flex items-center justify-center font-headline-lg text-headline-lg hover:bg-secondary hover:text-on-secondary transition-colors cursor-pointer shadow-sm active:scale-95 spring-bounce">
                    R
                </div>
</div>
<!-- Row 3 -->
<div class="flex justify-center gap-2">
<div class="w-[88px] h-[100px] bg-secondary-container text-on-secondary-container clip-hexagon flex items-center justify-center font-headline-lg text-headline-lg hover:bg-secondary hover:text-on-secondary transition-colors cursor-pointer shadow-sm active:scale-95 spring-bounce">
                    I
                </div>
<div class="w-[88px] h-[100px] bg-secondary-container text-on-secondary-container clip-hexagon flex items-center justify-center font-headline-lg text-headline-lg hover:bg-secondary hover:text-on-secondary transition-colors cursor-pointer shadow-sm active:scale-95 spring-bounce">
                    P
                </div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex justify-center items-center gap-4 w-full max-w-sm mb-auto">
<button class="flex-1 py-4 px-6 rounded-full bg-surface-container-high text-on-surface-variant font-label-lg text-label-lg tracking-wide hover:bg-surface-variant transition-colors shadow-sm active:scale-95 spring-bounce">
                Delete
            </button>
<button class="w-[60px] h-[60px] flex-shrink-0 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface-variant hover:bg-surface-variant transition-colors shadow-sm active:scale-95 spring-bounce">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">shuffle</span>
</button>
<button class="flex-1 py-4 px-6 rounded-full bg-tertiary text-on-tertiary font-label-lg text-label-lg tracking-wide hover:opacity-90 transition-opacity shadow-sm active:scale-95 spring-bounce">
                Enter
            </button>
</div>
<!-- Progress & Found Words (Bottom Sheet style) -->
<div class="w-full max-w-md bg-surface-container rounded-2xl p-5 mt-10 shadow-[0_4px_24px_0_rgba(0,0,0,0.06)] border border-outline-variant/30 relative overflow-hidden">
<!-- Subtle accent graphic -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container/20 rounded-bl-full -z-10"></div>
<div class="flex justify-between items-center mb-4">
<h3 class="font-title-lg text-title-lg text-on-surface">Found Words</h3>
<div class="bg-primary-container text-on-primary-container px-4 py-1.5 rounded-full font-label-lg text-label-lg font-bold flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">star</span>
                    Score: 42
                </div>
</div>
<div class="flex gap-2 overflow-x-auto hide-scrollbar pb-2">
<span class="px-4 py-2 bg-surface rounded-lg text-on-surface font-body-md whitespace-nowrap border border-outline-variant/50">COPTIC</span>
<span class="px-4 py-2 bg-surface rounded-lg text-on-surface font-body-md whitespace-nowrap border border-outline-variant/50">OPTIC</span>
<span class="px-4 py-2 bg-surface rounded-lg text-on-surface font-body-md whitespace-nowrap border border-outline-variant/50">PORTIC</span>
<span class="px-4 py-2 bg-surface rounded-lg text-on-surface font-body-md whitespace-nowrap border border-outline-variant/50">CRISP</span>
<span class="px-4 py-2 bg-surface rounded-lg text-on-surface font-body-md whitespace-nowrap border border-outline-variant/50 border-dashed border-primary text-primary">4 more...</span>
</div>
</div>

<nav class="fixed bottom-0 w-full z-50 rounded-t-lg bg-surface-container dark:bg-surface-container shadow-[0_-4px_12px_0_rgba(0,0,0,0.04)] shadow-lg fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-margin-mobile pb-md pt-sm md:hidden">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-lg py-xs hover:bg-surface-variant dark:hover:bg-on-tertiary-fixed-variant transition-all active:scale-90 transition-all duration-300 spring-bounce rounded-lg">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">dashboard</span>

<button class="flex flex-col items-center justify-center bg-secondary-container dark:bg-on-secondary-fixed-variant text-on-secondary-container dark:text-secondary-fixed rounded-full px-lg py-xs hover:bg-surface-variant dark:hover:bg-on-tertiary-fixed-variant transition-all active:scale-90 transition-all duration-300 spring-bounce">

</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-lg py-xs hover:bg-surface-variant dark:hover:bg-on-tertiary-fixed-variant transition-all active:scale-90 transition-all duration-300 spring-bounce rounded-lg">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">mic</span>
<span class="font-label-sm text-label-sm">Voice</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-lg py-xs hover:bg-surface-variant dark:hover:bg-on-tertiary-fixed-variant transition-all active:scale-90 transition-all duration-300 spring-bounce rounded-lg">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">leaderboard</span>
<span class="font-label-sm text-label-sm">Leaderboard</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-lg py-xs hover:bg-surface-variant dark:hover:bg-on-tertiary-fixed-variant transition-all active:scale-90 transition-all duration-300 spring-bounce rounded-lg">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">person</span>

</button>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">dashboard</span>
<span class="font-label-lg text-label-lg">Board</span>
</button>
<button class="flex items-center gap-4 bg-secondary-container text-on-secondary-container px-4 py-3 rounded-full font-bold">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">videogame_asset</span>
<span class="font-label-lg text-label-lg">Games</span>
</button>
<button class="flex items-center gap-4 text-on-surface-variant px-4 py-3 hover:bg-surface-variant transition-all rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">mic</span>
<span class="font-label-lg text-label-lg">Voice</span>
</button>
<button class="flex items-center gap-4 text-on-surface-variant px-4 py-3 hover:bg-surface-variant transition-all rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">leaderboard</span>
<span class="font-label-lg text-label-lg">Leaderboard</span>
</button>
<button class="flex items-center gap-4 text-on-surface-variant px-4 py-3 hover:bg-surface-variant transition-all rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">person</span>

</button>
