# XcodeGen project specification for SideQuest_iOS.
#
# Why XcodeGen: this repo is developed on Windows where Xcode is unavailable,
# so the Xcode project is defined declaratively here and materialized into
# `SideQuest_iOS.xcodeproj` with `xcodegen generate` on a macOS machine (see
# README.md). This keeps the project definition reviewable as plain text and
# free of the merge-hostile generated `.pbxproj`.
#
# This file is the source of truth for task 1:
#   * a main app target (SwiftUI lifecycle) + a Share Extension target
#   * both iPhone-only (TARGETED_DEVICE_FAMILY = 1)
#   * a declared Minimum_iOS_Version (IPHONEOS_DEPLOYMENT_TARGET = 16.0)
#   * the App Group entitlement on both targets (identical identifier)
#   * the shared SideQuestKit package linked by both targets
#   * GRDB + SwiftCheck dependencies (declared in SideQuestKit/Package.swift)

name: SideQuest_iOS

options:
  bundleIdPrefix: com.sidequest
  developmentLanguage: en
  deploymentTarget:
    iOS: "16.0"          # Minimum_iOS_Version (Req 1.2)
  createIntermediateGroups: true

# Project-wide build settings applied to every target.
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"          # iPhone only (Req 1.1)
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"   # Minimum_iOS_Version (Req 1.2)
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

# Swift Package dependencies.
#   * SideQuestKit (local) carries the shared models/store/domain code AND the
#     GRDB + SwiftCheck SPM dependencies (see SideQuestKit/Package.swift). Both
#     targets link it, so both pick up GRDB transitively.
packages:
  SideQuestKit:
    path: SideQuestKit
  # GRDB is a transitive dependency of SideQuestKit (declared in its
  # Package.swift). The main app links it directly too because the board view
  # model consumes the repositories' GRDB `ValueObservation`/`AsyncValueObservation`
  # streams (design: "views update reactively via ValueObservation"). Declaring
  # it here makes `import GRDB` in the app target an explicit, resolvable
  # dependency. Same URL ⇒ SPM resolves it to the single shared GRDB package.
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.0.0

targets:

  # ---- Main app (SwiftUI lifecycle) -------------------------------------
  SideQuest_iOS:
    type: application
    platform: iOS
    sources:
      - path: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sidequest
        PRODUCT_NAME: SideQuest
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/SideQuest_iOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: SideQuestKit
      # GRDB powers the reactive board stream consumed by BoardViewModel.
      - package: GRDB
        product: GRDB
      # Embed the Share Extension inside the app bundle (Req 13.2 — the
      # extension is an associated app extension of this app).
      - target: ShareExtension

  # ---- Share Extension (separate process) -------------------------------
  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sidequest.ShareExtension
        PRODUCT_NAME: ShareExtension
        INFOPLIST_FILE: ShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: SideQuestKit

# Test target for the shared module is defined in SideQuestKit/Package.swift
# (SwiftCheck property tests). It is exercised via `swift test` in the package
# and surfaces in Xcode when the package is opened.
